name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:lines
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/mongodb-binaries
          key: mongodb-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm vitest run
        env:
          MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries

  playwright:
    runs-on: ubuntu-latest
    env:
      OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:9000
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_BUCKET: ybase-e2e
      OBJECT_STORAGE_ACCESS_KEY_ID: minioadmin
      OBJECT_STORAGE_SECRET_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Start test object storage
        run: |
          docker run --detach \
            --name ybase-minio \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$OBJECT_STORAGE_ACCESS_KEY_ID" \
            --env MINIO_ROOT_PASSWORD="$OBJECT_STORAGE_SECRET_ACCESS_KEY" \
            quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          for attempt in {1..30}; do
            if curl --fail --silent "$OBJECT_STORAGE_ENDPOINT/minio/health/live"; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs ybase-minio
              exit 1
            fi
            sleep 1
          done
          docker exec ybase-minio mc alias set test \
            http://127.0.0.1:9000 \
            "$OBJECT_STORAGE_ACCESS_KEY_ID" \
            "$OBJECT_STORAGE_SECRET_ACCESS_KEY"
          docker exec ybase-minio mc mb "test/$OBJECT_STORAGE_BUCKET"

      - name: Get Playwright version
        id: playwright-version
        run: node -p '"version=" + require("@playwright/test/package.json").version' >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test --reporter=list
        env:
          AUTH_SECRET: ci-only-secret-ci-only-secret
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: ybase_e2e
          IS_TEST: "true"
